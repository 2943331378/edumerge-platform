spring:
  application:
    name: edumerge

  # 启动时自动执行 schema.sql
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: true

  # ===== 文件上传大小限制 =====
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB

  # ===== MySQL 数据库配置 =====
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:edumerge}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 连接池配置（HikariCP）
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: true

  # ===== JPA/Hibernate 配置 (如果使用) =====
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 100

  # ===== Redis 缓存配置 =====
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      database: 0
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms
      client-type: lettuce

  # ===== RabbitMQ 消息队列配置 =====
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: /
    connection-timeout: 10000
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        concurrency: 5
        max-concurrency: 10
        prefetch: 1
    template:
      retry:
        enabled: true
        initial-interval: 1000
        max-attempts: 3
        max-interval: 10000
        multiplier: 1.0

  # ===== Jackson JSON 配置 =====
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false
      indent-output: false

  # ===== 异常处理配置 =====
  web:
    throw-exception-if-no-handler-found: true
    resources:
      add-mappings: false

# ===== MyBatis-Plus 配置 =====
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.edumerge.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    call-setters-on-nulls: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===== 日志配置 =====
logging:
  level:
    root: info
    com.edumerge: debug
    org.springframework: warn
    org.springframework.web: debug
    com.baomidou.mybatisplus: debug
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/edumerge.log
    max-size: 10MB
    max-history: 30

# ===== Milvus 向量数据库配置 =====
milvus:
  host: ${MILVUS_HOST:localhost}
  port: 19530
  database: edumerge
  timeout: 30000

# ===== LangChain4j 配置 =====
langchain4j:
  openai:
    api-key: ${DEEPSEEK_API_KEY}
    base-url: https://api.deepseek.com/v1
    model: deepseek-v4-flash
    # Embedding 模型单独配置 (DeepSeek 不支持 embeddings，需使用其他兼容 API)
    embedding-model: text-embedding-v4
    embedding-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedding-api-key: ${AI_API_KEY}

# ===== 应用自定义配置 =====
app:
  jwt:
    secret: ${JWT_SECRET:edumerge-jwt-secret-key-2026-for-hs256}
    expiration-ms: 7200000     # 2h (access token)
    refresh-expiration-ms: 604800000  # 7d (refresh token)

  rag:
    similarity-threshold: 0.35
    top-k: 5
    embedding-dimension: 1024
    chunk-size: 1000
    chunk-overlap: 100
    # 检索增强: 查询改写 + 多查询 + 相关性过滤
    query-rewrite:
      enabled: true
    multi-query:
      enabled: true
      count: 2          # 查询变体数 (含原始查询)
    relevance-filter:
      enabled: true
      min-relevance: 0.4  # 最低相关性阈值 (0-1)

  chat:
    # 对话记忆窗口: 每个会话保留最近 N 轮对话 (1 轮 = 1 条 ChatHistory = 2 条 ChatMessage)
    memory-window: 10

  document:
    # 上传文件存储目录 — 通过环境变量 APP_UPLOAD_DIR 覆盖
    upload-dir: ${APP_UPLOAD_DIR:./uploads}
    allowed-types: pdf,doc,docx,txt,md,jpg,jpeg,png,bmp,tiff
    max-upload-size: 50
    process-timeout: 300

  # ===== 异步线程池配置 =====
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 100

  # ===== AI Vision 配置 (图片/扫描版 PDF OCR) =====
  ai:
    vision:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen-vl-max
      max-tokens: 4096
      ocr-concurrency: 10

    # ===== AI 内容生成模型 (Qwen3.7-plus, 用于笔记/卡片/测验/思维导图) =====
    content:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      model: qwen3.7-plus

# ===== 服务器配置 =====
server:
  port: 8085
  servlet:
    context-path: /api
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# ===== Actuator + Prometheus 监控 =====
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: edumerge
    distribution:
      percentiles-histogram:
        http.server.requests: true
